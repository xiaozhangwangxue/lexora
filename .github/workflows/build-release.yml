name: Build and release Lexora

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'dev' }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            command: flutter build apk --release
            source: build/app/outputs/flutter-apk/app-release.apk
            artifact: lexora-android.apk
          - platform: linux
            os: ubuntu-latest
            command: flutter build linux --release
            source: build/linux/x64/release/bundle
            artifact: lexora-linux
          - platform: windows
            os: windows-latest
            command: flutter build windows --release
            source: build/windows/x64/runner/Release
            artifact: lexora-windows
          - platform: macos
            os: macos-latest
            command: flutter build macos --release
            source: build/macos/Build/Products/Release/lexora.app
            artifact: Lexora.app
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/lexora
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Select Xcode 26 for Liquid Glass
        if: matrix.platform == 'macos'
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
      - name: Install Linux build libraries
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
      - name: Generate platform shells
        run: flutter create --project-name lexora --platforms=android,linux,macos,windows .
      - name: Allow Android network lookups
        if: matrix.platform == 'android'
        run: |
          sed -i '/<manifest/a\\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          sed -i '/compileOptions {/a\\        isCoreLibraryDesugaringEnabled = true' android/app/build.gradle.kts
          printf '\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")\n}\n' >> android/app/build.gradle.kts
      - name: Restore stable Android signing key
        if: matrix.platform == 'android'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "One or more Android signing secrets are not configured."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
          dart run tool/configure_android_signing.dart
      - name: Allow macOS network lookups
        if: matrix.platform == 'macos'
        run: |
          cp packaging/macos/MainFlutterWindow.swift macos/Runner/MainFlutterWindow.swift
          sed -i '' 's/MACOSX_DEPLOYMENT_TARGET = 10.15/MACOSX_DEPLOYMENT_TARGET = 12.0/g' macos/Runner.xcodeproj/project.pbxproj
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" macos/Runner/Release.entitlements || /usr/libexec/PlistBuddy -c "Set :com.apple.security.network.client true" macos/Runner/Release.entitlements
          /usr/libexec/PlistBuddy -c "Add :com.apple.security.files.user-selected.read-write bool true" macos/Runner/Release.entitlements || /usr/libexec/PlistBuddy -c "Set :com.apple.security.files.user-selected.read-write true" macos/Runner/Release.entitlements
      - run: flutter pub get
      - run: dart run flutter_launcher_icons
      - run: flutter analyze
      - name: Run Flutter tests
        if: matrix.platform == 'linux'
        run: flutter test
      - name: Render production PDF preview
        if: matrix.platform == 'linux'
        run: dart run tool/generate_pdf_preview.dart
      - name: Upload PDF layout preview
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: lexora-pdf-qa
          path: apps/lexora/build/qa/qa-pdf-preview.pdf
          if-no-files-found: error
      - name: Build application
        run: ${{ matrix.command }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/apps/lexora/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Package Unix desktop build
        if: matrix.platform == 'linux'
        run: tar -C build/linux/x64/release/bundle -czf "lexora-linux-${RELEASE_VERSION}.tar.gz" .
      - name: Package macOS build
        if: matrix.platform == 'macos'
        run: |
          ditto -c -k --sequesterRsrc --keepParent "${{ matrix.source }}" "lexora-macos-${RELEASE_VERSION}.zip"
          bash tool/create_macos_dmg.sh \
            "${{ matrix.source }}" \
            packaging/macos/dmg-background-final.png \
            "lexora-macos-${RELEASE_VERSION}.dmg"
      - name: Package Windows build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: Compress-Archive -Path "${{ matrix.source }}\*" -DestinationPath "lexora-windows-$env:RELEASE_VERSION.zip"
      - name: Stage Android build
        if: matrix.platform == 'android'
        run: cp "${{ matrix.source }}" "lexora-android-${RELEASE_VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: lexora-${{ matrix.platform }}
          path: apps/lexora/lexora-*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: lexora-*
      - name: Mirror downloads to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$R2_BUCKET" ]; then
            echo "R2 secrets are not configured; GitHub Release remains the download source."
            exit 0
          fi
          for file in lexora-*; do
            npx wrangler r2 object put "$R2_BUCKET/$file" --file "$file" --remote
          done
