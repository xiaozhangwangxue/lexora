name: lexora
description: Lexora — turn a word list into a compact bilingual vocabulary book.
publish_to: none
version: 0.3.0+3

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_selector: ^1.1.0
  http: ^1.2.2
  intl: ^0.20.1
  path_provider: ^2.1.5
  pdfrx: ^2.4.7
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.4
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/lexora-icon.png
    - assets/github/github-mark.png
    - assets/github/github-avatar.png

flutter_launcher_icons:
  image_path: assets/icon/lexora-icon.png
  android: true
  ios: false
  windows:
    generate: true
  macos:
    generate: true
  adaptive_icon_background: "#091B4B"
  adaptive_icon_foreground: assets/icon/lexora-icon.png
